name: Publish validated educational results

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate educational content
        run: python scripts/validate_content.py
      - name: Build site
        run: python scripts/build_pages.py
      - name: Install browser QA runtime
        run: |
          python -m pip install --disable-pip-version-check playwright
          python -m playwright install --with-deps chromium
      - name: Run semantic browser QA
        run: python scripts/qa_pages.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          # Pages permaneció en deployment_queued más que el límite predeterminado
          # de 10 minutos en tres ejecuciones consecutivas.
          timeout: 1200000
